<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4-Week Walking & Ab Roller Plan</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">4-week plan</p>
      <h1>Walking Plan</h1>
      <p class="intro">
        A simple four-week plan with daily step goals and focused walking sessions.
        Tick things off as you do them. Your progress is stored locally in your browser.
      </p>
      <div class="header-actions">
        <button id="reset-progress" class="secondary-button" type="button">Reset all progress</button>
        <div class="auth-section">
          <span id="user-display" class="user-display" hidden></span>
          <button id="login-btn" class="secondary-button auth-button" type="button">
            <svg class="google-icon" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
              <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
              <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
              <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
            </svg>
            Sign in with Google
          </button>
          <button id="logout-btn" class="secondary-button" type="button" hidden>Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="summary-grid" id="summary-grid" aria-label="Plan summary"></section>
    <section id="plan-container" class="plan-container" aria-live="polite"></section>
  </main>

  <template id="week-template">
    <section class="week-card">
      <div class="week-header">
        <div>
          <p class="week-label"></p>
          <h2></h2>
          <p class="week-goal"></p>
        </div>
        <div class="week-progress-block">
          <div class="progress-meta"><span class="week-progress-text"></span></div>
          <div class="progress-bar" aria-hidden="true"><span></span></div>
        </div>
      </div>
      <div class="week-notes"></div>
      <div class="days"></div>
    </section>
  </template>

  <template id="day-template">
    <article class="day-card">
      <div class="day-header">
        <div>
          <p class="day-name"></p>
          <h3></h3>
        </div>
        <p class="day-focus"></p>
      </div>
      <div class="task-list"></div>
    </article>
  </template>

  <template id="task-template">
    <div class="task-row">
      <div class="task-copy">
        <h4></h4>
        <p class="task-description"></p>
        <p class="task-detail"></p>
      </div>
      <button class="done-button" type="button" aria-pressed="false">Done it</button>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
